<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>libtv · 生成器面板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 14% 12%, rgba(91,141,238,0.12), transparent 26%),
    radial-gradient(circle at 86% 10%, rgba(103,214,190,0.08), transparent 22%),
    #111214;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
}

.generator {
  width: 780px;
  background: #1c1d20;
  border-radius: 18px;
  border: 0.5px solid rgba(255,255,255,0.08);
  box-shadow: 0 24px 80px rgba(0,0,0,0.38);
  overflow: hidden;
}

.input-area {
  padding: 14px 16px 0;
}

.img-quick-head span:last-child {
  color: rgba(255,255,255,0.62);
}

.img-quick-range {
  width: 100%;
}

.img-caption {
  min-height: 14px;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  line-height: 1.2;
}

.ref-card.highlight {
  border-color: rgba(91,141,238,0.42);
  box-shadow: 0 0 0 1px rgba(91,141,238,0.16);
}

.input-box {
  width: 100%;
  min-height: 42px;
  max-height: 120px;
  resize: vertical;
  border: none;
  outline: none;
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  line-height: 1.65;
  font-family: inherit;
}

.input-box::placeholder { color: rgba(255,255,255,0.24); }

.divider {
  height: 0.5px;
  margin-top: 10px;
  background: rgba(255,255,255,0.06);
}

.toolbar {
  padding: 10px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.toolbar-left,
.toolbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.chip,
.tool-btn,
.count-btn,
.credit-btn {
  height: 34px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,0.58);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  font: inherit;
}

.chip:hover,
.tool-btn:hover,
.count-btn:hover,
.credit-btn:hover {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.82);
}

.tool-btn.active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.92); }
.tool-tip-wrap {
  position: relative;
  display: inline-flex;
}
.tool-tip {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  width: 180px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #2a2c34;
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  line-height: 1.5;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.15s ease, visibility 0.15s ease;
  z-index: 20;
}
.tool-tip-wrap:hover .tool-tip {
  opacity: 1;
  visibility: visible;
}

.mode-toggle-btn {
  position: relative;
}

.mini-switch {
  width: 32px;
  height: 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.08);
  position: relative;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease;
}

.mini-switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  transition: transform 0.18s ease;
}

.mini-switch.on {
  background: rgba(91,141,238,0.3);
  border-color: rgba(91,141,238,0.42);
}

.mini-switch.on::after {
  transform: translateX(14px);
}
.chip-label { font-size: 13px; }
.chip-meta { font-size: 11px; color: rgba(255,255,255,0.3); }
.arr { font-size: 9px; color: rgba(255,255,255,0.3); }
.vsep { width: 1px; height: 14px; background: rgba(255,255,255,0.1); }

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.send-btn:disabled {
  background: rgba(255,255,255,0.24);
  cursor: not-allowed;
}

.param-panel {
  display: none;
  border-top: 0.5px solid rgba(255,255,255,0.06);
}

.param-panel.open { display: block; }

.panel-scroll {
  max-height: 520px;
  overflow-y: auto;
  padding: 16px;
}

.panel-scroll::-webkit-scrollbar { width: 4px; }
.panel-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
}

.settings-list {
  display: grid;
  gap: 12px;
}

.default-grid {
  display: grid;
  grid-template-columns: 1fr 1.9fr;
  gap: 12px;
  order: 2;
}

.third-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  order: 3;
}

.advanced-block {
  display: grid;
  gap: 12px;
}

.advanced-block.hidden { display: none; }

.block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.block-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.image-block {
  display: grid;
  gap: 12px;
}

#imageParamsBlock { order: 1; }
#defaultAdvancedBlock { order: 2; }
#advancedBlock { order: 3; }

.image-block.hidden { display: none; }

.image-panel {
  padding: 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

.image-panel-head {
  display: none;
}

.image-panel-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.ref-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.ref-card {
  padding: 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  display: grid;
  gap: 12px;
  align-content: start;
}

.ref-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.ref-title {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  font-size: 13px;
  color: rgba(255,255,255,0.78);
}

.ref-slot {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 52px;
  flex-wrap: wrap;
}

.ref-add-btn {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  border: 1.5px dashed rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.18s ease;
}

.ref-add-btn:hover {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.06);
}

.ref-thumb {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 10px;
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: #2a2d35;
  flex-shrink: 0;
}

.ref-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.ref-slider {
  display: grid;
  gap: 8px;
}

.ref-slider.hidden {
  display: none;
}

.ref-slider-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.58);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}

.reset-btn:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.82);
}

.advanced-toggle {
  order: 2;
  padding: 14px 16px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
}

.advanced-toggle-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.advanced-toggle-meta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.46);
  font-size: 12px;
}

.chevron {
  width: 8px;
  height: 8px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(45deg);
  transition: transform 0.18s ease;
}

.advanced-toggle.open .chevron {
  transform: rotate(225deg);
}

.advanced-content {
  order: 3;
  padding: 16px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  display: grid;
  gap: 12px;
}

.advanced-content.hidden {
  display: none;
}

.ref-empty {
  font-size: 12px;
  color: rgba(255,255,255,0.24);
}

.image-setting + .image-setting {
  margin-top: 10px;
}

.image-setting {
  padding: 10px 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}

.image-setting.disabled {
  opacity: 0.42;
}

.image-setting.hidden {
  display: none;
}

.image-setting .setting-body {
  margin-top: 10px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 2.1fr;
  gap: 14px;
  align-items: center;
  margin-bottom: 18px;
}

.field-row:last-child { margin-bottom: 0; }

.field-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.slider-row {
  margin-top: 14px;
}

.slider-row + .slider-row {
  margin-top: 22px;
}

.slider-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.slider-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.setting-row {
  padding: 12px 14px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.025);
  min-height: 80px;
}

.default-grid .setting-row {
  min-height: 0;
  padding: 12px 14px;
  min-height: 78px;
}

.third-grid .setting-row {
  min-height: 0;
  padding: 12px 14px;
  min-height: 78px;
}

.default-grid .setting-top {
  min-height: 36px;
  align-items: center;
}

.third-grid .setting-top {
  min-height: 36px;
  align-items: center;
}

.default-grid .setting-left,
.default-grid .setting-left.tight {
  align-items: center;
  gap: 6px;
}

.third-grid .setting-left,
.third-grid .setting-left.tight {
  align-items: center;
  gap: 6px;
}

.default-grid .setting-name {
  font-size: 12px;
  line-height: 1;
}

.third-grid .setting-name {
  font-size: 12px;
  line-height: 1;
}

.default-grid .info-icon {
  width: 14px;
  height: 14px;
  font-size: 8px;
}

.third-grid .info-icon {
  width: 14px;
  height: 14px;
  font-size: 8px;
}

.default-grid .switch {
  transform: scale(0.92);
  transform-origin: center;
}

.third-grid .switch {
  transform: scale(0.92);
  transform-origin: center;
}

.setting-row.hidden { display: none; }
.setting-row.disabled { opacity: 0.4; }

.setting-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.setting-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.setting-left.tight {
  gap: 6px;
}

.setting-name {
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.setting-value {
  font-size: 13px;
  color: rgba(255,255,255,0.36);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.setting-body {
  margin-top: 8px;
}

.setting-body.hidden { display: none; }

.select {
  min-width: 96px;
  padding: 6px 28px 6px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.72);
  font: inherit;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.65) 50%),
    linear-gradient(135deg, rgba(255,255,255,0.65) 50%, transparent 50%);
  background-position:
    calc(100% - 16px) calc(50% - 2px),
    calc(100% - 10px) calc(50% - 2px);
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
}

.default-grid .select {
  min-width: 92px;
  height: 36px;
  padding: 0 28px 0 10px;
  font-size: 12px;
}

.profile-wide {
  grid-column: span 1;
}

.third-grid .select,
#profileInput {
  min-width: 144px;
  height: 36px;
  padding: 0 10px;
  font-size: 12px;
  background-image: none;
}

.info-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.info-icon {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  cursor: help;
  user-select: none;
}

.info-tip {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 8px);
  transform: translateX(-50%);
  width: 190px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #2a2c34;
  color: rgba(255,255,255,0.68);
  font-size: 12px;
  line-height: 1.55;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.15s ease, visibility 0.15s ease;
  z-index: 20;
}

.info-wrap:hover .info-tip {
  opacity: 1;
  visibility: visible;
}

.switch {
  width: 32px;
  height: 18px;
  border-radius: 9px;
  background: rgba(255,255,255,0.1);
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}

.switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.18s ease;
}

.switch.on { background: #5b8dee; }
.switch.on::after { transform: translateX(14px); }
.switch.disabled { opacity: 0.5; cursor: not-allowed; }

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

input[type=range]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border: none;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

@media (max-width: 820px) {
  .generator { width: 100%; }
  .mode-grid { gap: 8px; }
  .ref-grid { grid-template-columns: 1fr; }
  .default-grid { grid-template-columns: 1fr; }
  .third-grid { grid-template-columns: 1fr; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="generator">
  <div class="input-area">
    <textarea class="input-box" id="promptInput" rows="2" placeholder="描述你想生成的画面"></textarea>
  </div>

  <div class="divider"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="chip" onclick="cycleModel()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="opacity:0.5">
          <path d="M8 2L2 5.5v5L8 14l6-3.5v-5L8 2z" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
        </svg>
        <span class="chip-label" id="modelName">Midjourney V7</span>
        <span class="arr">▾</span>
      </button>
      <div class="vsep"></div>
      <button class="chip" onclick="cycleAspect()">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
          <rect x="1" y="1" width="12" height="8" rx="1.5" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
        </svg>
        <span class="chip-label" id="aspectName">16:9 · 自适应</span>
        <span class="arr">▾</span>
      </button>

      <div class="tool-tip-wrap">
        <button class="mode-toggle-btn mini-switch" id="rawModeBtn" onclick="toggleRawMode()" title="创意模式"></button>
        <div class="tool-tip" id="rawModeTip">默认模式：风格更鲜明，画面更具艺术表现力</div>
      </div>
    </div>

    <div class="toolbar-right">
      <button class="tool-btn active" id="paramBtn" onclick="togglePanel()" style="position:relative">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="5" cy="4" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 4h1.8M6.2 4H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="11" cy="8" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 8h7.8M12.2 8H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="7" cy="12" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 12h3.8M8.2 12H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="count-btn" onclick="cycleCount()">
        <span id="countName">4张</span>
        <span class="arr">▾</span>
      </button>

      <div class="credit-btn">
        <span style="font-size:11px;color:rgba(255,255,255,0.35)">⚡</span>
        <span>25</span>
      </div>

      <button class="send-btn" id="sendBtn" title="请输入文字提示词后生成" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M8 3L4 7M8 3l4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="param-panel open" id="paramPanel">
    <div class="panel-scroll">
      <div class="settings-list">
        <div class="advanced-block" id="defaultAdvancedBlock">
          <div class="advanced-toggle open" id="styleToggle" onclick="toggleStyleBlock()">
            <div class="advanced-toggle-title">美学风格</div>
            <div class="advanced-toggle-meta">
              <button class="reset-btn" onclick="event.stopPropagation(); resetStyleSettings();" title="参数重置">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M13.5 4.5V1.8M13.5 1.8H10.8M13.5 1.8 10.7 4.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M13 8A5 5 0 1 1 9 3.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </button>
              <span id="styleToggleText">收起</span>
              <span class="chevron"></span>
            </div>
          </div>
          <div class="advanced-content" id="styleContent">
          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>风格化</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制生成结果的艺术风格强度。</div>
                </div>
              </div>
              <div class="setting-value" id="stylizeValue">1000</div>
            </div>
            <input type="range" id="stylizeRange" min="0" max="1000" value="1000" step="1">
          </div>

          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>怪异度</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制画面偏离常规的程度。</div>
                </div>
              </div>
              <div class="setting-value" id="weirdValue">100</div>
            </div>
            <input type="range" id="weirdRange" min="0" max="3000" value="100" step="1">
          </div>

          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>多样性</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制结果之间的发散程度。</div>
                </div>
              </div>
              <div class="setting-value" id="chaosValue">5</div>
            </div>
            <input type="range" id="chaosRange" min="0" max="100" value="5" step="1">
          </div>
          </div>
        </div>

        <div class="advanced-block" id="advancedBlock">
        <div class="advanced-toggle" id="advancedToggle" onclick="toggleAdvanced()">
          <div class="advanced-toggle-title">高级设置</div>
          <div class="advanced-toggle-meta">
            <span id="advancedToggleText">展开</span>
            <span class="chevron"></span>
          </div>
        </div>

        <div class="advanced-content hidden" id="advancedContent">
          <div class="default-grid" id="defaultGrid">
            <div class="setting-row" id="qualityRow">
              <div class="setting-top">
                <div class="setting-left">
                  <div class="setting-name">细节质量</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                  <div class="info-tip">控制图像的细节丰富程度，数值越高处理时间越长但图像更精细。</div>
                  </div>
                </div>
                <select class="select" id="qualitySelect">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="4">4</option>
                </select>
              </div>
            </div>

            <div class="setting-row profile-wide" id="profileRow">
              <div class="setting-top">
                <div class="setting-left">
                  <div class="setting-name">个性化偏好</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                    <div class="info-tip">输入你的个性化风格 P 值。</div>
                  </div>
                </div>
                <input class="select" id="profileInput" placeholder="输入风格p值">
              </div>
            </div>
          </div>

          <div class="third-grid" id="thirdGrid">
            <div class="setting-row" id="expRow">
              <div class="setting-top">
                <div class="setting-left tight">
                  <div class="setting-name">风格实验</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                    <div class="info-tip">生成更详细、动态、创意且色调映射更丰富的图像。</div>
                  </div>
                  <div class="switch" id="expSwitch" onclick="toggleExp()"></div>
                </div>
                <div class="setting-value" id="expValue">0</div>
              </div>
              <div class="setting-body hidden" id="expBody">
                <input type="range" id="expRange" min="0" max="100" value="0" step="1">
              </div>
            </div>

            <div class="setting-row" id="seedRow">
              <div class="setting-top">
                <div class="setting-left tight">
                  <div class="setting-name">种子测试</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                    <div class="info-tip">固定初始状态，一键复刻作品</div>
                  </div>
                  <div class="switch" id="seedSwitch" onclick="toggleSeed()"></div>
                </div>
                <div class="setting-value" id="seedValue">0</div>
              </div>
              <div class="setting-body hidden" id="seedBody">
                <input type="range" id="seedRange" min="0" max="4294967295" value="0" step="1">
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  model: 'v7',
  aspectIndex: 0,
  countIndex: 0,
  prompt: '',
  raw: false,
  draft: false,
  turbo: false,
  tile: false,
  quality: '1',
  profile: '',
  stylize: 1000,
  weird: 100,
  chaos: 5,
  expOn: false,
  exp: 0,
  seedOn: false,
  seedValue: 0,
  styleOpen: true,
  advancedOpen: false
};

const aspects = ['16:9 · 自适应', '1:1 · 方形', '9:16 · 竖版', '4:3', '3:4'];
const counts = ['4张', '2张', '1张'];

function cycleModel() {
  state.model = state.model === 'v7' ? 'niji7' : 'v7';
  render();
}

function cycleAspect() {
  state.aspectIndex = (state.aspectIndex + 1) % aspects.length;
  document.getElementById('aspectName').textContent = aspects[state.aspectIndex];
}

function cycleCount() {
  state.countIndex = (state.countIndex + 1) % counts.length;
  document.getElementById('countName').textContent = counts[state.countIndex];
}

function togglePanel() {
  const panel = document.getElementById('paramPanel');
  const btn = document.getElementById('paramBtn');
  const open = panel.classList.contains('open');
  panel.classList.toggle('open', !open);
  btn.classList.toggle('active', !open);
}

function setRawMode(enabled) {
  state.raw = enabled;
  renderRawMode();
}

function toggleRawMode() {
  setRawMode(!state.raw);
}

function setDraftMode(enabled) {
  state.draft = enabled;
  renderDraftMode();
}

function setTurboMode(enabled) {
  state.turbo = enabled;
  renderSpeedMode();
}

function resetStyleSettings() {
  state.stylize = 1000;
  state.weird = 100;
  state.chaos = 5;
  document.getElementById('stylizeRange').value = state.stylize;
  document.getElementById('weirdRange').value = state.weird;
  document.getElementById('chaosRange').value = state.chaos;
  document.getElementById('stylizeValue').textContent = state.stylize;
  document.getElementById('weirdValue').textContent = state.weird;
  document.getElementById('chaosValue').textContent = state.chaos;
  updateTrack(document.getElementById('stylizeRange'));
  updateTrack(document.getElementById('weirdRange'));
  updateTrack(document.getElementById('chaosRange'));
}

function toggleExp() {
  if (state.model !== 'v7') return;
  state.expOn = !state.expOn;
  renderExp();
}

function toggleSeed() {
  state.seedOn = !state.seedOn;
  if (state.seedOn && Number(state.seedValue) === 0) {
    state.seedValue = Math.floor(Math.random() * 4294967295);
    document.getElementById('seedRange').value = state.seedValue;
  }
  renderSeed();
}

function toggleAdvanced() {
  state.advancedOpen = !state.advancedOpen;
  renderAdvancedToggle();
}

function toggleStyleBlock() {
  state.styleOpen = !state.styleOpen;
  renderStyleToggle();
}

function renderTop() {
  document.getElementById('modelName').textContent = state.model === 'v7' ? 'Midjourney V7' : 'Midjourney Niji 7';
  document.getElementById('aspectName').textContent = aspects[state.aspectIndex];
  document.getElementById('countName').textContent = counts[state.countIndex];
}

function renderAdvancedLayout() {
  const defaultGrid = document.getElementById('defaultGrid');
  const thirdGrid = document.getElementById('thirdGrid');
  const qualityRow = document.getElementById('qualityRow');
  const profileRow = document.getElementById('profileRow');
  const qualityVisible = qualityRow.style.display !== 'none';

  defaultGrid.style.gridTemplateColumns = qualityVisible ? '1fr 1.9fr' : '1fr';
  thirdGrid.style.gridTemplateColumns = '1fr';
  profileRow.style.gridColumn = qualityVisible ? 'auto' : '1 / -1';

  [defaultGrid, thirdGrid].forEach((grid) => {
    const hasVisibleRow = Array.from(grid.children).some((row) => row.style.display !== 'none');
    grid.style.display = hasVisibleRow ? 'grid' : 'none';
  });
}

function renderAdvancedToggle() {
  const toggle = document.getElementById('advancedToggle');
  const content = document.getElementById('advancedContent');
  toggle.classList.toggle('open', state.advancedOpen);
  content.classList.toggle('hidden', !state.advancedOpen);
  document.getElementById('advancedToggleText').textContent = state.advancedOpen ? '收起' : '展开';
}

function renderStyleToggle() {
  const toggle = document.getElementById('styleToggle');
  const content = document.getElementById('styleContent');
  toggle.classList.toggle('open', state.styleOpen);
  content.classList.toggle('hidden', !state.styleOpen);
  document.getElementById('styleToggleText').textContent = state.styleOpen ? '收起' : '展开';
}

function renderRawMode() {
  const btn = document.getElementById('rawModeBtn');
  const tip = document.getElementById('rawModeTip');
  btn.classList.toggle('on', state.raw);
  btn.setAttribute('title', state.raw ? '原生模式' : '创意模式');
  tip.textContent = state.raw
    ? 'Raw 模式：风格更克制，结果更真实自然'
    : '默认模式：风格更鲜明，画面更具艺术表现力';
}

function renderDraftMode() {
  const item = document.getElementById('qualityModeItem');
  const btn = document.getElementById('draftModeBtn');
  if (!item || !btn) {
    state.draft = false;
    return;
  }
  const wrap = btn.parentElement;
  const standardSeg = document.getElementById('draftStandardSeg');
  const draftSeg = document.getElementById('draftDraftSeg');
  const tip = document.getElementById('draftModeTip');
  const visible = state.model === 'v7';
  item.style.display = visible ? 'flex' : 'none';
  wrap.style.display = visible ? 'inline-flex' : 'none';
  if (!visible) {
    state.draft = false;
  }
  btn.setAttribute('title', state.draft ? '草图模式已开启' : '标准模式');
  standardSeg.classList.toggle('on', !state.draft);
  draftSeg.classList.toggle('on', state.draft);
  tip.textContent = state.draft ? '快速出图，高效打磨创意' : '标准模式，正常生成';
}

function renderSpeedMode() {
  const fastSeg = document.getElementById('speedFastSeg');
  const turboSeg = document.getElementById('speedTurboSeg');
  const tip = document.getElementById('speedModeTip');
  if (!fastSeg || !turboSeg || !tip) {
    state.turbo = false;
    return;
  }
  fastSeg.classList.toggle('on', !state.turbo);
  turboSeg.classList.toggle('on', state.turbo);
  tip.textContent = state.turbo ? '极速模式，更高速度生成' : '快速模式，默认生成速度';
}

function renderSendButton() {
  const btn = document.getElementById('sendBtn');
  const enabled = state.prompt.trim().length > 0;
  btn.disabled = !enabled;
  btn.title = enabled ? '开始生成' : '请输入文字提示词后生成';
}

function renderQuality() {
  const row = document.getElementById('qualityRow');
  row.style.display = state.model === 'v7' ? '' : 'none';
}

function renderExp() {
  const row = document.getElementById('expRow');
  const sw = document.getElementById('expSwitch');
  const body = document.getElementById('expBody');
  const visible = state.model === 'v7';
  row.style.display = visible ? '' : 'none';
  sw.className = 'switch' + (state.expOn ? ' on' : '') + (!visible ? ' disabled' : '');
  body.classList.toggle('hidden', !state.expOn || !visible);
  document.getElementById('expValue').textContent = state.expOn && visible ? state.exp : '';
  if (!visible) state.expOn = false;
}

function renderSeed() {
  const sw = document.getElementById('seedSwitch');
  const body = document.getElementById('seedBody');
  sw.className = 'switch' + (state.seedOn ? ' on' : '');
  body.classList.toggle('hidden', !state.seedOn);
  document.getElementById('seedValue').textContent = state.seedOn ? state.seedValue : '';
}

function render() {
  renderTop();
  renderRawMode();
  renderDraftMode();
  renderSpeedMode();
  renderSendButton();
  renderStyleToggle();
  renderAdvancedToggle();
  renderQuality();
  renderExp();
  renderSeed();
  renderAdvancedLayout();
}

function updateTrack(input) {
  const min = parseFloat(input.min);
  const max = parseFloat(input.max);
  const val = parseFloat(input.value);
  const pct = ((val - min) / (max - min) * 100).toFixed(1);
  input.style.background = `linear-gradient(to right, rgba(255,255,255,0.65) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
}

document.getElementById('qualitySelect').addEventListener('change', (e) => {
  state.quality = e.target.value;
});

document.getElementById('promptInput').addEventListener('input', (e) => {
  state.prompt = e.target.value;
  renderSendButton();
});

document.getElementById('profileInput').addEventListener('input', (e) => {
  state.profile = e.target.value;
});

[
  ['stylizeRange', 'stylize', value => value, 'stylizeValue'],
  ['weirdRange', 'weird', value => value, 'weirdValue'],
  ['chaosRange', 'chaos', value => value, 'chaosValue'],
  ['expRange', 'exp', value => value, 'expValue'],
  ['seedRange', 'seedValue', value => value, 'seedValue']
].forEach(([id, key, formatter, labelId]) => {
  const input = document.getElementById(id);
  input.addEventListener('input', () => {
    state[key] = Number(input.value);
    if (labelId) {
      document.getElementById(labelId).textContent = formatter(Number(input.value));
    }
    updateTrack(input);
  });
  updateTrack(input);
});

render();
</script>
</body>
</html>
