<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>libtv · 生成器面板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 14% 12%, rgba(91,141,238,0.12), transparent 26%),
    radial-gradient(circle at 86% 10%, rgba(103,214,190,0.08), transparent 22%),
    #111214;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
}

.generator {
  width: 780px;
  background: #1c1d20;
  border-radius: 18px;
  border: 0.5px solid rgba(255,255,255,0.08);
  box-shadow: 0 24px 80px rgba(0,0,0,0.38);
  overflow: hidden;
}

.input-area {
  padding: 14px 16px 0;
}

.upload-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 12px;
}

.upload-strip-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
}

.upload-thumb-list {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
}

.upload-item {
  width: 74px;
  display: grid;
  justify-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.upload-thumb,
.upload-add-btn {
  width: 74px;
  height: 74px;
  border-radius: 14px;
  flex-shrink: 0;
}

.upload-thumb {
  position: relative;
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: #2a2d35;
  cursor: pointer;
  transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
}

.upload-thumb:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.18);
  box-shadow: 0 10px 20px rgba(0,0,0,0.22);
}

.upload-thumb.active {
  border-color: rgba(91,141,238,0.44);
  box-shadow: 0 0 0 1px rgba(91,141,238,0.18);
}

.upload-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.upload-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: none;
  background: rgba(12,13,15,0.72);
  color: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  cursor: pointer;
  z-index: 2;
}

.upload-ref-badge {
  min-width: 66px;
  height: 22px;
  padding: 0 12px;
  border-radius: 999px;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.68);
  font-size: 11px;
  line-height: 1;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}

.upload-ref-badge.empty {
  min-width: 74px;
  padding: 0 10px;
}

.upload-thumb-wrap {
  position: relative;
}

.thumb-type-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  min-width: 94px;
  padding: 6px;
  border-radius: 12px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: #272a31;
  box-shadow: 0 14px 24px rgba(0,0,0,0.28);
  display: grid;
  gap: 4px;
  z-index: 30;
}

.thumb-type-menu.hidden {
  display: none;
}

.thumb-type-option {
  height: 28px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.68);
  font: inherit;
  font-size: 11px;
  cursor: pointer;
}

.thumb-type-option:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.92);
}

.thumb-type-option.on {
  background: rgba(91,141,238,0.18);
  color: rgba(228,236,255,0.96);
}

.upload-ref-badge:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.9);
}

.upload-ref-badge.type-image {
  background: rgba(88,200,163,0.14);
  border-color: rgba(88,200,163,0.24);
  color: rgba(146,234,207,0.92);
}

.upload-ref-badge.type-style {
  background: rgba(145,126,255,0.14);
  border-color: rgba(145,126,255,0.24);
  color: rgba(198,188,255,0.92);
}

.upload-ref-badge.type-subject {
  background: rgba(234,171,78,0.14);
  border-color: rgba(234,171,78,0.26);
  color: rgba(255,219,164,0.94);
}

.upload-add-btn {
  border: 1.5px dashed rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.18s ease;
}

.upload-add-btn:hover {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.06);
}

.upload-add-plus {
  font-size: 24px;
  line-height: 1;
  color: rgba(255,255,255,0.34);
}

.upload-add-label {
  font-size: 11px;
  color: rgba(255,255,255,0.24);
}

.input-box {
  width: 100%;
  min-height: 42px;
  max-height: 120px;
  resize: vertical;
  border: none;
  outline: none;
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  line-height: 1.65;
  font-family: inherit;
}

.input-box::placeholder { color: rgba(255,255,255,0.24); }

.divider {
  height: 0.5px;
  margin-top: 10px;
  background: rgba(255,255,255,0.06);
}

.toolbar {
  padding: 10px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.toolbar-left,
.toolbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.chip,
.tool-btn,
.count-btn,
.credit-btn {
  height: 34px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,0.58);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 0 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  font: inherit;
}

.chip:hover,
.tool-btn:hover,
.count-btn:hover,
.credit-btn:hover {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.82);
}

.tool-btn.active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.92); }
.tool-tip-wrap {
  position: relative;
  display: inline-flex;
}
.tool-tip {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  width: 180px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #2a2c34;
  color: rgba(255,255,255,0.72);
  font-size: 12px;
  line-height: 1.5;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.15s ease, visibility 0.15s ease;
  z-index: 20;
}
.tool-tip-wrap:hover .tool-tip {
  opacity: 1;
  visibility: visible;
}

.mode-toggle-btn {
  position: relative;
}

.mini-switch {
  width: 32px;
  height: 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.08);
  position: relative;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease;
}

.mini-switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  transition: transform 0.18s ease;
}

.mini-switch.on {
  background: rgba(91,141,238,0.3);
  border-color: rgba(91,141,238,0.42);
}

.mini-switch.on::after {
  transform: translateX(14px);
}
.chip-label { font-size: 13px; }
.chip-meta { font-size: 11px; color: rgba(255,255,255,0.3); }
.arr { font-size: 9px; color: rgba(255,255,255,0.3); }
.vsep { width: 1px; height: 14px; background: rgba(255,255,255,0.1); }

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.send-btn:disabled {
  background: rgba(255,255,255,0.24);
  cursor: not-allowed;
}

.ref-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.ref-section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: rgba(255,255,255,0.9);
  font-weight: 600;
}

.ref-section-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
}

.ref-section-dot.image { background: #58c8a3; }
.ref-section-dot.style { background: #917eff; }
.ref-section-dot.subject { background: #e6a54a; }

.ref-section-meta {
  font-size: 12px;
  color: rgba(255,255,255,0.42);
}

.ref-dropzone {
  min-height: 92px;
  padding: 8px;
  border-radius: 14px;
  border: 1px dashed rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.02);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.ref-dropzone.dragover {
  border-color: rgba(91,141,238,0.38);
  background: rgba(91,141,238,0.08);
}

.ref-drop-empty {
  color: rgba(255,255,255,0.26);
  font-size: 12px;
  padding: 0 6px;
}

.ref-section-thumb {
  width: 72px;
  display: grid;
  justify-items: center;
  gap: 6px;
}

.ref-section-add {
  width: 72px;
  height: 72px;
  border-radius: 14px;
  border: 1.5px dashed rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: rgba(255,255,255,0.34);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.16s ease;
}

.ref-section-add:hover {
  border-color: rgba(255,255,255,0.24);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.62);
}

.ref-section-add-plus {
  font-size: 24px;
  line-height: 1;
}

.ref-section-add-text {
  font-size: 11px;
}

.ref-drop-empty-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.ref-drop-empty-text {
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  line-height: 1.6;
}

.ref-section-thumb-card {
  width: 72px;
  height: 72px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #272a31;
  cursor: pointer;
}

.ref-section-thumb-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: none;
  background: rgba(12,13,15,0.72);
  color: rgba(255,255,255,0.94);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
}

.ref-section-thumb-card.active {
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
}

.ref-section-thumb-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.ref-section-thumb-label {
  min-height: 14px;
  font-size: 10px;
  color: rgba(255,255,255,0.48);
}

.ref-section-slider {
  display: grid;
  gap: 8px;
}

.ref-section-slider-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: rgba(255,255,255,0.72);
  font-size: 13px;
}

.param-panel {
  display: none;
  border-top: 0.5px solid rgba(255,255,255,0.06);
}

.param-panel.open { display: block; }

.panel-scroll {
  max-height: 520px;
  overflow-y: auto;
  padding: 16px;
}

.panel-scroll::-webkit-scrollbar { width: 4px; }
.panel-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
}

.settings-list {
  display: grid;
  gap: 12px;
}

.default-grid {
  display: grid;
  grid-template-columns: 1fr 1.9fr;
  gap: 12px;
  order: 2;
}

.third-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  order: 3;
}

.advanced-block {
  display: grid;
  gap: 12px;
}

.advanced-block.hidden { display: none; }

.block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.block-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.image-block {
  display: grid;
  gap: 12px;
}

#imageParamsBlock { order: 1; }
#defaultAdvancedBlock { order: 2; }
#advancedBlock { order: 3; }

.image-block.hidden { display: none; }

.image-panel {
  padding: 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

.image-panel-head {
  display: none;
}

.image-panel-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.ref-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.ref-card {
  padding: 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  display: grid;
  gap: 12px;
  align-content: start;
}

.ref-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.ref-title {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  font-size: 13px;
  color: rgba(255,255,255,0.78);
}

.ref-slot {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 52px;
  flex-wrap: wrap;
}

.ref-add-btn {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  border: 1.5px dashed rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.18s ease;
}

.ref-add-btn:hover {
  border-color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.06);
}

.ref-thumb {
  position: relative;
  width: 52px;
  height: 52px;
  border-radius: 10px;
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: #2a2d35;
  flex-shrink: 0;
}

.ref-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.ref-slider {
  display: grid;
  gap: 8px;
}

.ref-slider.hidden {
  display: none;
}

.ref-slider-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.58);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}

.reset-btn:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.82);
}

.advanced-toggle {
  order: 2;
  padding: 14px 16px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
}

.advanced-toggle-title {
  font-size: 12px;
  color: rgba(255,255,255,0.72);
}

.advanced-toggle-meta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.46);
  font-size: 12px;
}

.chevron {
  width: 8px;
  height: 8px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(45deg);
  transition: transform 0.18s ease;
}

.advanced-toggle.open .chevron {
  transform: rotate(225deg);
}

.advanced-content {
  order: 3;
  padding: 16px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  display: grid;
  gap: 12px;
}

.advanced-content.hidden {
  display: none;
}

.ref-empty {
  font-size: 12px;
  color: rgba(255,255,255,0.24);
}

.image-setting + .image-setting {
  margin-top: 10px;
}

.image-setting {
  padding: 10px 12px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
}

.image-setting.disabled {
  opacity: 0.42;
}

.image-setting.hidden {
  display: none;
}

.image-setting .setting-body {
  margin-top: 10px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 2.1fr;
  gap: 14px;
  align-items: center;
  margin-bottom: 18px;
}

.field-row:last-child { margin-bottom: 0; }

.field-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.slider-row {
  margin-top: 14px;
}

.slider-row + .slider-row {
  margin-top: 22px;
}

.slider-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.slider-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.setting-row {
  padding: 12px 14px;
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.025);
  min-height: 80px;
}

.default-grid .setting-row {
  min-height: 0;
  padding: 12px 14px;
  min-height: 78px;
}

.third-grid .setting-row {
  min-height: 0;
  padding: 12px 14px;
  min-height: 78px;
}

.default-grid .setting-top {
  min-height: 36px;
  align-items: center;
}

.third-grid .setting-top {
  min-height: 36px;
  align-items: center;
}

.default-grid .setting-left,
.default-grid .setting-left.tight {
  align-items: center;
  gap: 6px;
}

.third-grid .setting-left,
.third-grid .setting-left.tight {
  align-items: center;
  gap: 6px;
}

.default-grid .setting-name {
  font-size: 12px;
  line-height: 1;
}

.third-grid .setting-name {
  font-size: 12px;
  line-height: 1;
}

.default-grid .info-icon {
  width: 14px;
  height: 14px;
  font-size: 8px;
}

.third-grid .info-icon {
  width: 14px;
  height: 14px;
  font-size: 8px;
}

.default-grid .switch {
  transform: scale(0.92);
  transform-origin: center;
}

.third-grid .switch {
  transform: scale(0.92);
  transform-origin: center;
}

.setting-row.hidden { display: none; }
.setting-row.disabled { opacity: 0.4; }

.setting-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.setting-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.setting-left.tight {
  gap: 6px;
}

.setting-name {
  font-size: 13px;
  color: rgba(255,255,255,0.72);
}

.setting-value {
  font-size: 13px;
  color: rgba(255,255,255,0.36);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.setting-body {
  margin-top: 8px;
}

.setting-body.hidden { display: none; }

.select {
  min-width: 96px;
  padding: 6px 28px 6px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.72);
  font: inherit;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.65) 50%),
    linear-gradient(135deg, rgba(255,255,255,0.65) 50%, transparent 50%);
  background-position:
    calc(100% - 16px) calc(50% - 2px),
    calc(100% - 10px) calc(50% - 2px);
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
}

.default-grid .select {
  min-width: 92px;
  height: 36px;
  padding: 0 28px 0 10px;
  font-size: 12px;
}

.profile-wide {
  grid-column: span 1;
}

.third-grid .select,
#profileInput {
  min-width: 144px;
  height: 36px;
  padding: 0 10px;
  font-size: 12px;
  background-image: none;
}

.info-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.info-icon {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  cursor: help;
  user-select: none;
}

.info-tip {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 8px);
  transform: translateX(-50%);
  width: 190px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.12);
  background: #2a2c34;
  color: rgba(255,255,255,0.68);
  font-size: 12px;
  line-height: 1.55;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.15s ease, visibility 0.15s ease;
  z-index: 20;
}

.info-wrap:hover .info-tip {
  opacity: 1;
  visibility: visible;
}

.switch {
  width: 32px;
  height: 18px;
  border-radius: 9px;
  background: rgba(255,255,255,0.1);
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}

.switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.18s ease;
}

.switch.on { background: #5b8dee; }
.switch.on::after { transform: translateX(14px); }
.switch.disabled { opacity: 0.5; cursor: not-allowed; }

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

input[type=range]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border: none;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

@media (max-width: 820px) {
  .generator { width: 100%; }
  .mode-grid { gap: 8px; }
  .ref-grid { grid-template-columns: 1fr; }
  .default-grid { grid-template-columns: 1fr; }
  .third-grid { grid-template-columns: 1fr; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

  <div class="generator">
  <div class="input-area">
    <div class="upload-strip">
      <div class="upload-strip-row">
        <div class="upload-thumb-list" id="imageThumbList"></div>
        <label class="upload-add-btn" for="imageInput">
          <div class="upload-add-plus">+</div>
          <div class="upload-add-label">图片</div>
        </label>
        <input id="imageInput" type="file" accept="image/*" multiple hidden>
      </div>
    </div>

    <textarea class="input-box" id="promptInput" rows="2" placeholder="描述你想生成的画面"></textarea>
  </div>

  <div class="divider"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="chip" onclick="cycleModel()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="opacity:0.5">
          <path d="M8 2L2 5.5v5L8 14l6-3.5v-5L8 2z" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
        </svg>
        <span class="chip-label" id="modelName">Midjourney V7</span>
        <span class="arr">▾</span>
      </button>
      <div class="vsep"></div>
      <button class="chip" onclick="cycleAspect()">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
          <rect x="1" y="1" width="12" height="8" rx="1.5" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
        </svg>
        <span class="chip-label" id="aspectName">16:9 · 自适应</span>
        <span class="arr">▾</span>
      </button>

      <div class="tool-tip-wrap">
        <button class="mode-toggle-btn mini-switch" id="rawModeBtn" onclick="toggleRawMode()" title="创意模式"></button>
        <div class="tool-tip" id="rawModeTip">默认模式：风格更鲜明，画面更具艺术表现力</div>
      </div>
    </div>

    <div class="toolbar-right">
      <button class="tool-btn active" id="paramBtn" onclick="togglePanel()" style="position:relative">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="5" cy="4" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 4h1.8M6.2 4H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="11" cy="8" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 8h7.8M12.2 8H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="7" cy="12" r="1.2" stroke="currentColor" stroke-width="1.2"/>
          <path d="M2 12h3.8M8.2 12H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="count-btn" onclick="cycleCount()">
        <span id="countName">4张</span>
        <span class="arr">▾</span>
      </button>

      <div class="credit-btn">
        <span style="font-size:11px;color:rgba(255,255,255,0.35)">⚡</span>
        <span>25</span>
      </div>

      <button class="send-btn" id="sendBtn" title="请输入文字提示词后生成" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M8 3L4 7M8 3l4 4" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="param-panel open" id="paramPanel">
    <div class="panel-scroll">
      <div class="settings-list">
        <div class="advanced-block" id="defaultAdvancedBlock">
          <div class="advanced-toggle open" id="styleToggle" onclick="toggleStyleBlock()">
            <div class="advanced-toggle-title">美学风格</div>
            <div class="advanced-toggle-meta">
              <button class="reset-btn" onclick="event.stopPropagation(); resetStyleSettings();" title="参数重置">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M13.5 4.5V1.8M13.5 1.8H10.8M13.5 1.8 10.7 4.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M13 8A5 5 0 1 1 9 3.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </button>
              <span id="styleToggleText">收起</span>
              <span class="chevron"></span>
            </div>
          </div>
          <div class="advanced-content" id="styleContent">
          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>风格化</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制生成结果的艺术风格强度。</div>
                </div>
              </div>
              <div class="setting-value" id="stylizeValue">1000</div>
            </div>
            <input type="range" id="stylizeRange" min="0" max="1000" value="1000" step="1">
          </div>

          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>怪异度</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制画面偏离常规的程度。</div>
                </div>
              </div>
              <div class="setting-value" id="weirdValue">100</div>
            </div>
            <input type="range" id="weirdRange" min="0" max="3000" value="100" step="1">
          </div>

          <div class="slider-row">
            <div class="slider-head">
              <div class="slider-label">
                <span>多样性</span>
                <div class="info-wrap">
                  <div class="info-icon">?</div>
                  <div class="info-tip">控制结果之间的发散程度。</div>
                </div>
              </div>
              <div class="setting-value" id="chaosValue">5</div>
            </div>
            <input type="range" id="chaosRange" min="0" max="100" value="5" step="1">
          </div>
          </div>
        </div>

        <div class="advanced-block hidden" id="imageParamsBlock">
          <div class="advanced-toggle open">
            <div class="advanced-toggle-title">图片参考</div>
          </div>
          <div class="advanced-content" id="imageParamsContent">
            <div class="ref-grid" id="refGrid">
              <div class="ref-card" id="imageRefCard"></div>
              <div class="ref-card" id="styleRefCard"></div>
              <div class="ref-card" id="subjectRefCard"></div>
            </div>
          </div>
        </div>

        <div class="advanced-block" id="advancedBlock">
        <div class="advanced-toggle" id="advancedToggle" onclick="toggleAdvanced()">
          <div class="advanced-toggle-title">高级设置</div>
          <div class="advanced-toggle-meta">
            <span id="advancedToggleText">展开</span>
            <span class="chevron"></span>
          </div>
        </div>

        <div class="advanced-content hidden" id="advancedContent">
          <div class="default-grid" id="defaultGrid">
            <div class="setting-row" id="qualityRow">
              <div class="setting-top">
                <div class="setting-left">
                  <div class="setting-name">细节质量</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                  <div class="info-tip">控制图像的细节丰富程度，数值越高处理时间越长但图像更精细。</div>
                  </div>
                </div>
                <select class="select" id="qualitySelect">
                  <option value="1" selected>基础</option>
                  <option value="2">标准</option>
                  <option value="4">超清</option>
                </select>
              </div>
            </div>

            <div class="setting-row profile-wide" id="profileRow">
              <div class="setting-top">
                <div class="setting-left">
                  <div class="setting-name">个性化偏好</div>
                  <div class="info-wrap">
                    <div class="info-icon">?</div>
                    <div class="info-tip">输入你的个性化风格 P 值。</div>
                  </div>
                </div>
                <input class="select" id="profileInput" placeholder="输入风格p值">
              </div>
            </div>
          </div>

          <div class="third-grid hidden" id="thirdGrid"></div>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  model: 'v7',
  aspectIndex: 0,
  countIndex: 0,
  prompt: '',
  images: [],
  activeTypeMenuId: null,
  iw: 10,
  sw: 100,
  ow: 100,
  raw: false,
  draft: false,
  turbo: false,
  tile: false,
  quality: '1',
  profile: '',
  stylize: 1000,
  weird: 100,
  chaos: 5,
  styleOpen: true,
  advancedOpen: false
};

const aspects = ['16:9 · 自适应', '1:1 · 方形', '9:16 · 竖版', '4:3', '3:4'];
const counts = ['4张', '2张', '1张'];
const refTypeMeta = {
  image: {
    label: '元素参考',
    shortLabel: '元素',
    sliderLabel: '元素权重',
    range: [0, 30, 1],
    format: value => (value / 10).toFixed(1)
  },
  style: {
    label: '风格参考',
    shortLabel: '风格',
    sliderLabel: '风格强度',
    range: [0, 100, 1],
    format: value => String(value)
  },
  subject: {
    label: '主体参考',
    shortLabel: '主体',
    sliderLabel: '主体强度',
    range: [1, 1000, 10],
    format: value => String(value)
  }
};

function getImageById(id) {
  return state.images.find((image) => image.id === id) || null;
}

function getImagesByType(type) {
  return state.images.filter((image) => image.refType === type);
}

function subjectReferenceAvailable() {
  return state.model === 'v7';
}

function normalizeReferenceState() {
  if (!subjectReferenceAvailable()) {
    state.images = state.images.map((image) => image.refType === 'subject' ? { ...image, refType: null } : image);
  }
}

function createImageRecord(src) {
  return {
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    src,
    refType: null
  };
}

function getReferenceBadgeText(image) {
  if (!image.refType) return '设置参考';
  return refTypeMeta[image.refType].shortLabel;
}

function removeImageById(id) {
  state.images = state.images.filter((image) => image.id !== id);
  if (state.activeTypeMenuId === id) {
    state.activeTypeMenuId = null;
  }
  render();
}

function moveImageToType(id, type) {
  const image = getImageById(id);
  if (!image) return;
  if (type === 'subject' && !subjectReferenceAvailable()) return;

  if (type === 'subject') {
    state.images.forEach((item) => {
      if (item.id !== id && item.refType === 'subject') {
        item.refType = null;
      }
    });
  }

  image.refType = type;
}

function toggleTypeMenu(id) {
  state.activeTypeMenuId = state.activeTypeMenuId === id ? null : id;
  renderImageThumbs();
}

function dragRefImage(event, id) {
  event.dataTransfer.setData('text/plain', id);
  event.dataTransfer.effectAllowed = 'move';
}

function allowRefDrop(event) {
  event.preventDefault();
}

function handleRefDrop(event, type) {
  event.preventDefault();
  const id = event.dataTransfer.getData('text/plain');
  if (!id) return;
  moveImageToType(id, type);
  render();
}

function updateReferenceWeight(type, value) {
  const numeric = Number(value);
  if (type === 'image') {
    state.iw = numeric;
  } else if (type === 'style') {
    state.sw = numeric;
  } else if (type === 'subject') {
    state.ow = numeric;
  }
  renderImageReferenceBlock();
}

function renderImageThumbs() {
  const list = document.getElementById('imageThumbList');
  if (!list) return;
  list.innerHTML = state.images.map((image) => `
    <div class="upload-item">
      <div class="upload-thumb-wrap">
        <div class="upload-thumb" draggable="true" ondragstart="dragRefImage(event, '${image.id}')">
          <img src="${image.src}" alt="上传图片">
          <button class="upload-remove" onclick="event.stopPropagation(); removeImageById('${image.id}')">×</button>
        </div>
        <div class="thumb-type-menu ${state.activeTypeMenuId === image.id ? '' : 'hidden'}">
          <button class="thumb-type-option ${image.refType === 'image' ? 'on' : ''}" onclick="setImageReferenceType('${image.id}', 'image')">元素参考</button>
          <button class="thumb-type-option ${image.refType === 'style' ? 'on' : ''}" onclick="setImageReferenceType('${image.id}', 'style')">风格参考</button>
          ${subjectReferenceAvailable() ? `<button class="thumb-type-option ${image.refType === 'subject' ? 'on' : ''}" onclick="setImageReferenceType('${image.id}', 'subject')">主体参考</button>` : ''}
        </div>
      </div>
      <button class="upload-ref-badge ${image.refType ? `type-${image.refType}` : 'empty'}" onclick="toggleTypeMenu('${image.id}')">${getReferenceBadgeText(image)}</button>
    </div>
  `).join('');
}

function setImageReferenceType(id, type) {
  moveImageToType(id, type);
  state.activeTypeMenuId = null;
  render();
}

function buildInlineRefCard(type) {
  const card = document.getElementById(`${type}RefCard`);
  if (!card) return;
  const meta = refTypeMeta[type];
  const images = getImagesByType(type);
  const value = type === 'image' ? state.iw : type === 'style' ? state.sw : state.ow;
  const [min, max, step] = meta.range;
  const countText = type === 'subject' ? `${images.length}/1` : `${images.length}/4`;

  card.style.display = type === 'subject' && !subjectReferenceAvailable() ? 'none' : '';
  card.innerHTML = `
    <div class="ref-head">
      <div class="ref-title">
        <span>${meta.label}</span>
      </div>
      <div class="setting-value">${countText}</div>
    </div>
    <div class="ref-slot" ondragover="allowRefDrop(event)" ondrop="handleRefDrop(event, '${type}')">
      ${images.length ? images.map((image, index) => `
        <div class="ref-thumb">
          <button class="upload-remove" onclick="event.stopPropagation(); removeImageById('${image.id}')">×</button>
          <img src="${image.src}" alt="${meta.label}${index + 1}">
        </div>
      `).join('') : `
        <div class="ref-empty">拖拽顶部图片到这里，或点击上方图片下方标签设置为${meta.shortLabel}</div>
      `}
    </div>
    <div class="ref-slider">
      <div class="ref-slider-head">
        <div class="setting-name">${meta.sliderLabel}</div>
        <div class="setting-value">${meta.format(value)}</div>
      </div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${value}" oninput="updateReferenceWeight('${type}', this.value)">
    </div>
  `;
}

function renderImageReferenceBlock() {
  const block = document.getElementById('imageParamsBlock');
  if (!block) return;
  const visible = state.images.length > 0;
  block.classList.toggle('hidden', !visible);
  if (!visible) return;

  buildInlineRefCard('image');
  buildInlineRefCard('style');
  buildInlineRefCard('subject');
  block.querySelectorAll('input[type="range"]').forEach(updateTrack);
}

function cycleModel() {
  state.model = state.model === 'v7' ? 'niji7' : 'v7';
  normalizeReferenceState();
  render();
}

function cycleAspect() {
  state.aspectIndex = (state.aspectIndex + 1) % aspects.length;
  document.getElementById('aspectName').textContent = aspects[state.aspectIndex];
}

function cycleCount() {
  state.countIndex = (state.countIndex + 1) % counts.length;
  document.getElementById('countName').textContent = counts[state.countIndex];
}

function togglePanel() {
  const panel = document.getElementById('paramPanel');
  const btn = document.getElementById('paramBtn');
  const open = panel.classList.contains('open');
  panel.classList.toggle('open', !open);
  btn.classList.toggle('active', !open);
}

function setRawMode(enabled) {
  state.raw = enabled;
  renderRawMode();
}

function toggleRawMode() {
  setRawMode(!state.raw);
}

function setDraftMode(enabled) {
  state.draft = enabled;
  renderDraftMode();
}

function setTurboMode(enabled) {
  state.turbo = enabled;
  renderSpeedMode();
}

function resetStyleSettings() {
  state.stylize = 1000;
  state.weird = 100;
  state.chaos = 5;
  document.getElementById('stylizeRange').value = state.stylize;
  document.getElementById('weirdRange').value = state.weird;
  document.getElementById('chaosRange').value = state.chaos;
  document.getElementById('stylizeValue').textContent = state.stylize;
  document.getElementById('weirdValue').textContent = state.weird;
  document.getElementById('chaosValue').textContent = state.chaos;
  updateTrack(document.getElementById('stylizeRange'));
  updateTrack(document.getElementById('weirdRange'));
  updateTrack(document.getElementById('chaosRange'));
}

function toggleAdvanced() {
  state.advancedOpen = !state.advancedOpen;
  renderAdvancedToggle();
}

function toggleStyleBlock() {
  state.styleOpen = !state.styleOpen;
  renderStyleToggle();
}

function renderTop() {
  document.getElementById('modelName').textContent = state.model === 'v7' ? 'Midjourney V7' : 'Midjourney Niji 7';
  document.getElementById('aspectName').textContent = aspects[state.aspectIndex];
  document.getElementById('countName').textContent = counts[state.countIndex];
}

function renderAdvancedLayout() {
  const defaultGrid = document.getElementById('defaultGrid');
  const thirdGrid = document.getElementById('thirdGrid');
  const qualityRow = document.getElementById('qualityRow');
  const profileRow = document.getElementById('profileRow');
  const qualityVisible = qualityRow.style.display !== 'none';

  defaultGrid.style.gridTemplateColumns = qualityVisible ? '1fr 1.9fr' : '1fr';
  thirdGrid.style.gridTemplateColumns = '1fr';
  profileRow.style.gridColumn = qualityVisible ? 'auto' : '1 / -1';

  [defaultGrid, thirdGrid].forEach((grid) => {
    const hasVisibleRow = Array.from(grid.children).some((row) => row.style.display !== 'none');
    grid.style.display = hasVisibleRow ? 'grid' : 'none';
  });
}

function renderAdvancedToggle() {
  const toggle = document.getElementById('advancedToggle');
  const content = document.getElementById('advancedContent');
  toggle.classList.toggle('open', state.advancedOpen);
  content.classList.toggle('hidden', !state.advancedOpen);
  document.getElementById('advancedToggleText').textContent = state.advancedOpen ? '收起' : '展开';
}

function renderStyleToggle() {
  const toggle = document.getElementById('styleToggle');
  const content = document.getElementById('styleContent');
  toggle.classList.toggle('open', state.styleOpen);
  content.classList.toggle('hidden', !state.styleOpen);
  document.getElementById('styleToggleText').textContent = state.styleOpen ? '收起' : '展开';
}

function renderRawMode() {
  const btn = document.getElementById('rawModeBtn');
  const tip = document.getElementById('rawModeTip');
  btn.classList.toggle('on', state.raw);
  btn.setAttribute('title', state.raw ? '原生模式' : '创意模式');
  tip.textContent = state.raw
    ? 'Raw 模式：风格更克制，结果更真实自然'
    : '默认模式：风格更鲜明，画面更具艺术表现力';
}

function renderDraftMode() {
  const item = document.getElementById('qualityModeItem');
  const btn = document.getElementById('draftModeBtn');
  if (!item || !btn) {
    state.draft = false;
    return;
  }
  const wrap = btn.parentElement;
  const standardSeg = document.getElementById('draftStandardSeg');
  const draftSeg = document.getElementById('draftDraftSeg');
  const tip = document.getElementById('draftModeTip');
  const visible = state.model === 'v7';
  item.style.display = visible ? 'flex' : 'none';
  wrap.style.display = visible ? 'inline-flex' : 'none';
  if (!visible) {
    state.draft = false;
  }
  btn.setAttribute('title', state.draft ? '草图模式已开启' : '标准模式');
  standardSeg.classList.toggle('on', !state.draft);
  draftSeg.classList.toggle('on', state.draft);
  tip.textContent = state.draft ? '快速出图，高效打磨创意' : '标准模式，正常生成';
}

function renderSpeedMode() {
  const fastSeg = document.getElementById('speedFastSeg');
  const turboSeg = document.getElementById('speedTurboSeg');
  const tip = document.getElementById('speedModeTip');
  if (!fastSeg || !turboSeg || !tip) {
    state.turbo = false;
    return;
  }
  fastSeg.classList.toggle('on', !state.turbo);
  turboSeg.classList.toggle('on', state.turbo);
  tip.textContent = state.turbo ? '极速模式，更高速度生成' : '快速模式，默认生成速度';
}

function renderSendButton() {
  const btn = document.getElementById('sendBtn');
  const enabled = state.prompt.trim().length > 0;
  btn.disabled = !enabled;
  btn.title = enabled ? '开始生成' : '请输入文字提示词后生成';
}

function renderQuality() {
  const row = document.getElementById('qualityRow');
  row.style.display = state.model === 'v7' ? '' : 'none';
}

function render() {
  renderTop();
  renderImageThumbs();
  renderImageReferenceBlock();
  renderRawMode();
  renderDraftMode();
  renderSpeedMode();
  renderSendButton();
  renderStyleToggle();
  renderAdvancedToggle();
  renderQuality();
  renderAdvancedLayout();
}

function updateTrack(input) {
  const min = parseFloat(input.min);
  const max = parseFloat(input.max);
  const val = parseFloat(input.value);
  const pct = ((val - min) / (max - min) * 100).toFixed(1);
  input.style.background = `linear-gradient(to right, rgba(255,255,255,0.65) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
}

document.getElementById('qualitySelect').addEventListener('change', (e) => {
  state.quality = e.target.value;
});

document.getElementById('imageInput').addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  files.forEach((file) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      const image = createImageRecord(event.target.result);
      image.refType = 'image';
      state.images.push(image);
      state.styleOpen = true;
      state.activeTypeMenuId = image.id;
      render();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

document.getElementById('promptInput').addEventListener('input', (e) => {
  state.prompt = e.target.value;
  renderSendButton();
});

document.getElementById('profileInput').addEventListener('input', (e) => {
  state.profile = e.target.value;
});

[
  ['stylizeRange', 'stylize', value => value, 'stylizeValue'],
  ['weirdRange', 'weird', value => value, 'weirdValue'],
  ['chaosRange', 'chaos', value => value, 'chaosValue']
].forEach(([id, key, formatter, labelId]) => {
  const input = document.getElementById(id);
  input.addEventListener('input', () => {
    state[key] = Number(input.value);
    if (labelId) {
      document.getElementById(labelId).textContent = formatter(Number(input.value));
    }
    updateTrack(input);
  });
  updateTrack(input);
});

document.addEventListener('click', (event) => {
  if (!event.target.closest('.upload-item')) {
    if (state.activeTypeMenuId) {
      state.activeTypeMenuId = null;
      renderImageThumbs();
    }
  }
});

render();
</script>
</body>
</html>
